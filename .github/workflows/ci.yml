name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  QEMU_REF: 3b50303f9563a42538a1fd5c0ea7f952e23016e1
  CCACHE_DIR: /home/runner/.cache/ccache
  CCACHE_MAXSIZE: 2G

jobs:
  qemu-tmp102:
    name: Apply patches, build QEMU, run tests
    runs-on: ubuntu-24.04
    timeout-minutes: 60

    steps:
      - name: Check out project
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            ccache \
            flex \
            bison \
            git \
            ninja-build \
            pkg-config \
            python3 \
            python3-pip \
            python3-venv \
            libglib2.0-dev \
            libpixman-1-dev \
            libfdt-dev \
            zlib1g-dev

      - name: Install Meson
        run: |
          python3 -m venv "$RUNNER_TEMP/meson"
          "$RUNNER_TEMP/meson/bin/pip" install 'meson>=1.5,<2'
          echo "$RUNNER_TEMP/meson/bin" >> "$GITHUB_PATH"

      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: /home/runner/.cache/ccache
          key: ccache-${{ runner.os }}-${{ hashFiles('patches/*.patch') }}
          restore-keys: |
            ccache-${{ runner.os }}-

      - name: Clone pinned QEMU
        run: |
          git clone --filter=blob:none https://gitlab.com/qemu-project/qemu.git "$RUNNER_TEMP/qemu"
          cd "$RUNNER_TEMP/qemu"
          git checkout "$QEMU_REF"
          git submodule update --init --recursive --depth 1

      - name: Apply TMP102 patch series
        run: |
          cd "$RUNNER_TEMP/qemu"
          git config user.name "CI"
          git config user.email "ci@example.invalid"
          git am "$GITHUB_WORKSPACE"/patches/*.patch

      - name: Configure QEMU
        run: |
          cd "$RUNNER_TEMP/qemu"
          echo "/usr/lib/ccache" >> "$GITHUB_PATH"
          export PATH="/usr/lib/ccache:$PATH"
          ccache --zero-stats
          ./configure \
            --target-list=arm-softmmu \
            --disable-docs \
            --disable-werror \
            --disable-gtk \
            --disable-sdl \
            --disable-slirp

      - name: Build QEMU ARM system emulator
        run: |
          cd "$RUNNER_TEMP/qemu"
          ninja -C build qemu-system-arm

      - name: Run TMP102 qtests
        run: |
          cd "$RUNNER_TEMP/qemu"
          meson test -C build --print-errorlogs \
            qemu:qtest-arm/qos-test \
            qemu:qtest-arm/tmp102-migration-test

      - name: Run firmware host test
        run: make -C firmware/tmp102-demo test

      - name: Show ccache statistics
        if: always()
        run: ccache --show-stats
